<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AI Pulse</title>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", sans-serif;
      width: 360px;
      padding: 14px;
      color: #1a1a1a;
      background: #fafafa;
    }
    h3 {
      margin: 0 0 4px;
      font-size: 15px;
    }
    .subtitle {
      font-size: 11px;
      color: #888;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: none;
      border-radius: 6px;
      background: #222;
      color: white;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #000; }
    #status {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      min-height: 14px;
    }
    #results {
      max-height: 340px;
      overflow-y: auto;
    }
    .story {
      padding: 8px 0;
      border-bottom: 1px solid #e5e5e5;
    }
    .story:last-child { border-bottom: none; }
    .story a {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      text-decoration: none;
      line-height: 1.35;
    }
    .story a:hover { text-decoration: underline; }
    .meta {
      font-size: 11px;
      color: #888;
      margin-top: 3px;
    }
  </style>
</head>
<body>
  <h3>AI Pulse</h3>
  <div class="subtitle">Latest AI discussion, straight from Hacker News</div>
  <button id="refreshBtn">Refresh</button>
  <div id="status"></div>
  <div id="results"></div>
  <script src="popup.js"></script>
</body>
</html>
